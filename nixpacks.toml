[phases.setup]
nixPkgs = [
    "php82",
    "php82Packages.composer",
    "php82Packages.gd",
    "php82Packages.zip"
]

[variables]
# Memaksa Composer mengabaikan pengecekan ekstensi saat proses install
COMPOSER_ALLOW_SUPERUSER = "1"

[phases.build]
# Kita gunakan flag --ignore-platform-reqs agar build tetap lanjut meski ada masalah ekstensi
cmds = ["composer install --no-dev --optimize-autoloader --ignore-platform-reqs"]