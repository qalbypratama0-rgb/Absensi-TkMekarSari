[phases.setup]
nixPkgs = [
    "php82",
    "php82Packages.composer",
    "php82Packages.gd",
    "php82Packages.zip"
]

[variables]
# Mengizinkan composer berjalan sebagai root dan menonaktifkan audit keamanan
COMPOSER_ALLOW_SUPERUSER = "1"
COMPOSER_DISABLE_NETWORK = "0"

[phases.build]
# Flag --ignore-platform-reqs: mengabaikan ekstensi GD/ZIP yang hilang
# Flag --no-audit: mengabaikan keamanan advisories
# Flag --no-dev: tidak menginstal paket development agar lebih ringan
cmds = [
    "composer update --no-dev --optimize-autoloader --ignore-platform-reqs --no-audit"
]